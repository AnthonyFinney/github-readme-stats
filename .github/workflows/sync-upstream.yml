name: Sync fork with upstream

on:
  # Runs every night at 01:00 UTC (change if you like)
  schedule:
    - cron: "0 1 * * *"
  # Allows manual run from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/anuraghazra/github-readme-stats.git
          git fetch upstream

      - name: Merge upstream/master into master
        run: |
          # If your default branch is main, change both 'master' to 'main'
          git checkout master
          git merge --ff-only upstream/master || {
            echo "Fast-forward merge failed (probably local changes).";
            exit 1;
          }

      - name: Push changes back to fork
        run: |
          git push origin master
